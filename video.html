<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Youtube Clone</title>
    <link rel="icon" href="/Youtube-clone/img/youtube.png" type="image/png" />
    <link rel="stylesheet" href="youtube.css" />
  </head>
  <body>
    <header class="cabecalho">
      <div class="logo">
        <img src="/Youtube-clone/img/cardapio.png" alt="sidebar" />

      <div class="left">
        <a href="#"> <img src="/Youtube-clone/img/envio.png" alt="Enviar" /></a>
        <a href="#"

        /></a>
        <a href="#"
          ><img
            class="avatar"
            src="/Youtube-clone/img/unnamed.jpg"
            alt="avatar"
        /></a>
      </div>
    </header>
    <main>
      <section>
        <iframe
          width="560"
          height="315"
          src="https://www.youtube.com/embed/DeQ9CgfPgtI?si=EpdZ-r5wImivk8QF"
          title="YouTube video player"
          frameborder="0"
          allow="
            accelerometer;
            autoplay;
            clipboard-write;
            encrypted-media;
            gyroscope;
            picture-in-picture;
            web-share;
          "
          referrerpolicy="strict-origin-when-cross-origin"
          allowfullscreen
        ></iframe>
        <h3>MUNDO LINDO | Os lugares mais bonitos do planeta</h3>
        <div class="canal-dd">
          <div class="canal-info">
            <a href="https://www.youtube.com/@LifederPortuguese"
              ><img
                class="canal"
                src="/Youtube-clone/img/canal.jpg"
                alt="canal"
            /></a>
            <div class="info">
              <a href="https://www.youtube.com/@LifederPortuguese"
                ><h5>Lifeder Portuguese</h5></a
              >
              <h6>441 mil Inscritos</h6>
            </div>
            <button>Inscrever-se</button>
          </div>

          <div class="botao">
            <button><img src="" alt="" /></button>
            <button><img src="" alt="" /></button>
            <button><img src="" alt="" /></button>
          </div>
        </div>

        <div class="descricao">
          <h5>13 mi de visualizações há 2 anos</h5>
          <h5>Os lugares mais bonitos do mundo.</h5>
          <h5>Locais naturais e países que desafiam a imaginação.</h5>
          <h5>Paisagens tão incríveis que é difícil acreditar que existam.</h5>
        </div>
      </section>
      <aside>
        <img src="/Youtube-clone/img/Sidebar.png" alt="" />
      </aside>
    </main>

</html>
