<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Youtube Clone</title>
    <link
      rel="icon"
      href="/Youtube-clone-main/img/youtube.png"
      type="image/png"
    />
    <link rel="stylesheet" href="youtube.css" />
  </head>
  <body>
    <header class="cabecalho">
      <div class="logo">
        <img src="/Youtube-clone-main/img/cardapio.png" alt="sidebar" />
        <a href="youtube.html">
          <img src="/Youtube-clone-main/img/youtube 1.png" alt="logoYoutube"
        /></a>
      </div>

      <form class="pesquisar" action="">
        <input type="search" placeholder="Pesquisar" aria-label="Pesquisar" />
        <button type="submit">
          <img src="/Youtube-clone-main/img/lupa.png" alt="Pesquisar" />
        </button>
      </form>

      <div class="left">
        <a href="#">
          <img src="/Youtube-clone-main/img/envio.png" alt="Enviar"
        /></a>
        <a href="#"
          ><img
            src="/Youtube-clone-main/img/packard-bell.png"
            alt="Notificação"
        /></a>
        <a href="#"
          ><img
            class="avatar"
            src="/Youtube-clone-main/img/unnamed.jpg"
            alt="avatar"
        /></a>
      </div>
    </header>
    <main>
      <a href="/Youtube-clone-main/video.html">
        <img src="/Youtube-clone-main/img/mqdefault_6s.webp" alt="Video"
      /></a>
    </main>
  </body>
</html>
